name: iTF Cloud Compiler
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get iOS SDK
        run: |
          curl -L -O https://github.com/xybp888/iOS-SDKs/releases/download/iOS26.2-SDKs/iPhoneOS26.2.sdk.zip
          unzip -q iPhoneOS26.2.sdk.zip
          # Set proper SDK permissions
          chmod -R 755 iPhoneOS26.2.sdk

      - name: Compile C++ Logic
        run: |
          mkdir -p build/iTF.app
          clang++ -target arm64-apple-ios15.0 \
            -isysroot ./iPhoneOS26.2.sdk \
            -std=c++17 -I include -c src/shell/Shell.cpp -o build/Shell.o

      - name: Compile Swift & Link Binary
        run: |
          swiftc -target arm64-apple-ios15.0 \
            -sdk ./iPhoneOS26.2.sdk \
            -I ./iPhoneOS26.2.sdk/usr/include \
            -L ./iPhoneOS26.2.sdk/usr/lib \
            -import-objc-header include/Bridge.h \
            -parse-as-library \
            -Xcc -fno-implicit-modules \
            -Xcc -fno-modules \
            -Xlinker -rpath \
            -Xlinker @executable_path/Frameworks \
            -Xlinker -rpath \
            -Xlinker @loader_path/Frameworks \
            src/main.swift src/ui/TerminalView.swift build/Shell.o \
            -o build/iTF.app/iTF 2>&1 | tee build_output.log

      - name: Finalize .app Bundle
        run: |
          mkdir -p build/iTF.app
          cp resources/Info.plist build/iTF.app/Info.plist
          cp resources/AppIcon.png build/iTF.app/AppIcon.png
          echo -n "APPL????" > build/iTF.app/PkgInfo
          chmod +x build/iTF.app/iTF

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/iTF.app Payload/
          zip -r iTF.ipa Payload
          rm -rf Payload

      - name: Upload Finished IPA
        uses: actions/upload-artifact@v4
        with:
          name: iTF-Sideload-Ready
          path: iTF.ipa

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_output.log
